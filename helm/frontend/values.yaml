replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REGISTRY/eksplat-frontend
  tag: "initial" # CI overwrites this with a commit-sha tag on every build; never left as "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: frontend

env:
  REACT_APP_BACKEND_URL: "/api/items"

ingress:
  enabled: true
  host: app.example.internal
  wafArn: ""
  certificateArn: ""
  cognito:
    enabled: false
    userPoolArn: ""
    userPoolClientId: ""
    userPoolDomain: ""

environment: dev

tags:
  project: eksplat
  component: frontend

replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REGISTRY/eksplat-backend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: backend

# Non-secret config only. DB credentials, the Cognito client secret, and
# any API tokens come from Vault via the agent injector below - nothing
# secret ever sits in a Helm value, a ConfigMap, or a plain k8s Secret.
env:
  DB_NAME: "appdb"

vault:
  enabled: true
  role: "" # set per-env, e.g. backend-dev / backend-test (see values-<env>.yaml)
  addr: ""  # set per-env, e.g. https://vault.dev.example.internal
  dbSecretPath: "" # e.g. secret/data/dev/db

ingress:
  enabled: false

environment: dev

tags:
  project: eksplat
  component: backend

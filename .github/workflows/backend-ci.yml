name: Backend CI/CD

on:
  push:
    branches: [dev, test]
    paths:
      - "apps/backend/**"
  pull_request:
    paths:
      - "apps/backend/**"

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  ECR_REPOSITORY: eksplat-backend
  AWS_REGION: ap-south-1
  WORKING_DIR: apps/backend

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test -- --passWithNoTests

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }} \
                       -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ env.WORKING_DIR }}/trivy-image.sarif

      - name: Push image (only after scan passes)
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  update-manifest:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment
        id: env
        run: |
          ENV=dev
          if [ "${{ github.ref_name }}" == "test" ]; then ENV=test; fi
          echo "name=$ENV" >> "$GITHUB_OUTPUT"

      - name: Fetch GitOps push token from AWS Secrets Manager
        id: gh-token
        run: |
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id eksplat-${{ steps.env.outputs.name }}-github-token \
            --query SecretString --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Bump image tag in Helm values (GitOps trigger for ArgoCD)
        run: |
          sed -i "s/^  tag: .*/  tag: \"${{ needs.build-and-push.outputs.image_tag }}\"/" helm/backend/values-${{ steps.env.outputs.name }}.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.gh-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git add helm/backend/values-*.yaml
          git commit -m "ci: bump backend image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]" || echo "no changes"
          git push

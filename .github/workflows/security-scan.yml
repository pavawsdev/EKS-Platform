name: Security Scans

on:
  workflow_call:
  pull_request:
  push:
    branches: [dev, test]

permissions:
  contents: read
  security-events: write

jobs:
  # ---- Secret scanning ----
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks - scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---- Terraform static analysis ----
  tfsec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tfsec - Terraform security scan
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: terraform
          sarif_file: tfsec.sarif
      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec.sarif

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov - IaC misconfiguration scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          # Several checks depend on values that only exist in dev.tfvars
          # (environment_config has no default) - without this, checkov
          # can't resolve them and falls back to conservative module
          # defaults, producing false positives (e.g. the EKS public
          # endpoint CIDR check).
          var_file: terraform/environments/tfvars/dev.tfvars
          # These 5 checks are intentionally, permanently skipped repo-wide
          # (each also has an inline #checkov:skip with the full reasoning
          # at its resource - some of these run as graph-based checks in
          # this checkov version and don't honor inline comments, hence
          # doing it here too):
          #   CKV_AWS_260 - the ALB is a public web app; port 80 exists to
          #     redirect to HTTPS, open-to-internet is the intended design
          #   CKV2_AWS_5  - the ALB SG is attached by the in-cluster AWS
          #     Load Balancer Controller, outside Terraform's static graph
          #   CKV_AWS_355 - every remaining "*" Resource is an AWS list/
          #     describe action with no resource-level permissions support
          #   CKV2_AWS_57 - no GitHub API exists to rotate a PAT in place
          #   CKV_AWS_39  - EKS public endpoint must stay reachable (CIDR-
          #     restricted) since GitHub-hosted runners aren't in the VPC
          skip_check: CKV_AWS_260,CKV2_AWS_5,CKV_AWS_355,CKV2_AWS_57,CKV_AWS_39
          soft_fail: false
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ---- Application source code SAST ----
  codeql:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["javascript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ---- Dependency vulnerability scanning ----
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm audit - frontend
        working-directory: apps/frontend
        run: npm audit --audit-level=high || true
      - name: npm audit - backend
        working-directory: apps/backend
        run: npm audit --audit-level=high || true
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  # ---- Kubernetes / Helm manifest scanning ----
  kube-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: KubeLinter - Helm chart best practices
        uses: stackrox/kube-linter-action@v1
        with:
          directory: helm
